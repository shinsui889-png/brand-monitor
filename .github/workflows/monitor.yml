name: Brand Monitor

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（UTC）に実行
  workflow_dispatch:        # 手動実行・テスト用

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # notified.json をコミット・プッシュするため

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run brand monitor
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python src/main.py
        working-directory: ${{ github.workspace }}

      - name: Save notified.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notified.json
          # 変更がある場合のみコミット（[skip ci] で再トリガーを防止）
          git diff --staged --quiet || \
            git commit -m "chore: update notified items [skip ci]"
          git push
